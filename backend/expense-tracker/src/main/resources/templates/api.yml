openapi: 3.0.0
info:
  title: Expense Tracker API
  version: 1.0.0
  description: API for managing expenses and user profiles in the Expense Tracker application.
servers:
  - url: http://localhost:8080/api
    description: Local development server
paths:
  /hello:
    get:
      summary: Greet the user
      description: Returns a greeting message.
      responses:
        '200':
          description: A successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, welcome to the Expense Tracker API!"